name: build

on:
    push:
    pull_request:

jobs:
    build:
        name: Build application
        runs-on: ubuntu-latest

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up JDK 25
                uses: actions/setup-java@v5
                with:
                    java-version: '25'
                    distribution: 'temurin'
                    cache: 'maven'

            -   name: Build jar
                run: ./mvnw --batch-mode --errors --show-version --no-transfer-progress clean package -DskipTests

            -   name: Upload jar artifact
                uses: actions/upload-artifact@v4
                with:
                    name: app-jar
                    path: target/*.jar
                    if-no-files-found: error
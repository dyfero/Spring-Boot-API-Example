name: tests

on:
    push:
    pull_request:
    workflow_dispatch:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/api-example
    SPRING_DATASOURCE_USERNAME: api-example
    SPRING_DATASOURCE_PASSWORD: secret

jobs:
    integration-tests:
        name: Integration tests
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:18-alpine
                env:
                    POSTGRES_DB: api-example
                    POSTGRES_USER: api-example
                    POSTGRES_PASSWORD: secret
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U api-example -d api-example"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            -   name: Checkout
                uses: actions/checkout@v6

            -   name: Set up JDK 25
                uses: actions/setup-java@v5
                with:
                    java-version: '25'
                    distribution: 'temurin'
                    cache: 'maven'

            -   name: Check Java
                run: java -version

            -   name: Check Maven
                run: ./mvnw -version

            -   name: Run tests
                run: ./mvnw --batch-mode --errors --show-version --no-transfer-progress test